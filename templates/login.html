{% extends "base.html" %}
{% load static %}


{% block title %}
Login
{% endblock %}

{% block content %}

<div class="card">

<h2>Login</h2>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<p>

Don't have an account?

<a href="/register/">

Register

</a>

</p>

</div>

<script src="{% static 'js/auth.js' %}"></script>

{% endblock %}
